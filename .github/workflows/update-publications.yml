name: Update publications

on:
  schedule:
    # Every Monday at 09:17 UTC. The non-round minute reduces peak-time delay.
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the website
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Query Crossref by ORCID
        env:
          PUBLICATIONS_ORCID: "0000-0002-9569-1902"
          CROSSREF_CONTACT_EMAIL: "hyowon.seo@stonybrook.edu"
        run: python scripts/update_publications.py

      - name: Commit new publication records
        shell: bash
        run: |
          if git diff --quiet -- data/publications.json; then
            echo "No publication changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/publications.json
          git commit -m "Update publications from Crossref"
          git push
